<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>BT Block Order Reset</title></head><body style="font-family:Arial;padding:24px"><h2>BT Block Order</h2><p>Clearing old app cache…</p><script>
(async()=>{
  try{ if('caches' in window){ const keys=await caches.keys(); await Promise.all(keys.map(k=>caches.delete(k))); } }catch(e){}
  try{ if('serviceWorker' in navigator){ const regs=await navigator.serviceWorker.getRegistrations(); await Promise.all(regs.map(r=>r.unregister())); } }catch(e){}
  location.replace('./index.html?v=' + Date.now());
})();
</script></body></html>
